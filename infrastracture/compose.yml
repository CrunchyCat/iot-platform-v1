name: iot-platform

services:

  postgres_devices_db:
    image: postgres:17-alpine
    container_name: pg_devices
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_DEVICES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DEVICES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEVICES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_DEVICES_USER}"]
      interval: 30s
      retries: 5

volumes:
  postgres_data:
